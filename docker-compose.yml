services:
  onsite-inspection-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onsite-inspection-scheduler
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_API_BASE_URL: /api/backend
      API_BASE_URL: http://127.0.0.1:3000/api/backend
      WORKSPACE_ADMIN_TOKEN: ${WORKSPACE_ADMIN_TOKEN:-}
      WORKSPACE_STATE_PATH: /data/workspace-state.json
    ports:
      - "3000:3000"
    volumes:
      - onsite-workspace-data:/data
    restart: unless-stopped

volumes:
  onsite-workspace-data:
